services:
  backend:
    build:
      context: .
      dockerfile: backend/backend/Dockerfile
    environment:
      DATABASE_URL: sqlite:////data/agentqa.db
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_INPUT_COST_PER_MILLION: ${GEMINI_INPUT_COST_PER_MILLION:-0.30}
      GEMINI_OUTPUT_COST_PER_MILLION: ${GEMINI_OUTPUT_COST_PER_MILLION:-2.50}
      SEMANTIC_JUDGE_PROVIDER: ${SEMANTIC_JUDGE_PROVIDER:-disabled}
      SEMANTIC_JUDGE_API_KEY: ${SEMANTIC_JUDGE_API_KEY:-}
      SEMANTIC_JUDGE_MODEL: ${SEMANTIC_JUDGE_MODEL:-gemini-2.5-flash}
      SEMANTIC_JUDGE_TIMEOUT_SECONDS: ${SEMANTIC_JUDGE_TIMEOUT_SECONDS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CORS_ALLOW_CREDENTIALS: "false"
      TRACE_REDACT_KEYS: ${TRACE_REDACT_KEYS:-authorization,cookie,set-cookie,api_key,apikey,password,secret,token}
      AUTHENTICATION_MODE: local-development-only
    ports:
      - "8000:8000"
    volumes:
      - agentqa-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_AGENTQA_API_URL: ${NEXT_PUBLIC_AGENTQA_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_AGENTQA_API_URL: ${NEXT_PUBLIC_AGENTQA_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  agentqa-data:
