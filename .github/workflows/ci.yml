name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      GEMINI_API_KEY: ""
      DATABASE_URL: sqlite:////tmp/agentqa-ci.db
      CORS_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/backend/requirements*.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r backend/backend/requirements-dev.txt
      - run: alembic upgrade head
      - run: pytest
      - run: ruff check backend/backend/app backend/backend/tests
      - run: ruff format --check backend/backend/app backend/backend/tests
      - run: mypy backend/backend/app

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: corepack enable
      - run: corepack prepare pnpm@10.12.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      ENVIRONMENT: test
      GEMINI_API_KEY: ""
      DATABASE_URL: sqlite:////tmp/agentqa-e2e.db
      CORS_ORIGINS: http://127.0.0.1:3000
      NEXT_PUBLIC_AGENTQA_API_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install -r backend/backend/requirements-dev.txt
      - run: alembic upgrade head
      - run: uvicorn app.main:app --app-dir backend/backend --host 127.0.0.1 --port 8000 > /tmp/agentqa-api.log 2>&1 &
      - run: corepack enable && corepack prepare pnpm@10.12.2 --activate
        working-directory: frontend
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: frontend
      - run: pnpm test:e2e
        working-directory: frontend

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
